name: admin_web
description: "TOEIC VocabBoost admin web application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  csv: ^6.0.0
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  flutter_dotenv: ^5.1.0
  google_generative_ai: ^0.4.0
  http: ^1.1.0
  image_picker: ^1.0.7
  supabase_flutter: ^2.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
